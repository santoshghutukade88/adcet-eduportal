function parseExcelLikeCSV(text) {
  const lines = text.trim().split("\n");
  const students = [];
  // detect header row
  const firstCols = lines[0].split(/[,\t]/).map(c => c.trim().toLowerCase());
  const hasHeader = firstCols.some(c => ["roll", "rollno", "roll no", "urn", "name"].includes(c));
  const startIdx = hasHeader ? 1 : 0;
  // detect column positions from header or assume order: rollNo, urn, name, department
  let rollIdx = 0, urnIdx = 1, nameIdx = 2, deptIdx = 3;
  if (hasHeader) {
    firstCols.forEach((c, i) => {
      if (c.includes("roll")) rollIdx = i;
      else if (c === "urn") urnIdx = i;
      else if (c === "name") nameIdx = i;
      else if (c.includes("dept") || c.includes("department")) deptIdx = i;
    });
  }
  for (let i = startIdx; i < lines.length; i++) {
    const cols = lines[i].split(/[,\t]/);
    if (cols.length >= 2) {
      const rollNo = (cols[rollIdx] || "").trim();
      const urn    = (cols[urnIdx]  || "").trim();
      const name   = (cols[nameIdx] || "").trim();
      const department = (cols[deptIdx] || "").trim();
      if (rollNo && name) {
        students.push({ rollNo, urn, name, department });
      }
    }
  }
  return students;
}

  };

  // ── Firebase: load all data on mount, then listen for live changes ──
  useEffect(() => {
    if (!window.FIREBASE_READY) { setDbStatus("offline"); return; }
    const ref = window.db.ref("adcet");
    // Load once on startup
    ref.once("value", snap => {
      const d = snap.val();
      if (!d) {
        // First ever run: push built-in seed data to Firebase
        fbSet("adcet/students",   studentsRaw);
        fbSet("adcet/attendance", attendanceRaw);
        fbSet("adcet/marks",      marksRaw);
        fbSet("adcet/customtabs", customTabsRaw);
        fbSet("adcet/ise2active", ise2ActiveRaw);
      } else {
        if (d.students)   setStudentsRaw(d.students);
        if (d.attendance) setAttendanceRaw(d.attendance);
        if (d.marks)      setMarksRaw(d.marks);
        if (d.customtabs) setCustomTabsRaw(d.customtabs);
        if (d.ise2active) setIse2ActiveRaw(d.ise2active);
      }
      setAppReady(true);
    });
    // Live listener — students see updates instantly when faculty saves
    ref.on("value", snap => {
      const d = snap.val();
      if (!d) return;
      if (d.attendance) setAttendanceRaw(d.attendance);
      if (d.marks)      setMarksRaw(d.marks);
      if (d.ise2active) setIse2ActiveRaw(d.ise2active);
      if (d.customtabs) setCustomTabsRaw(d.customtabs);
    });
    // Connection state badge
    window.db.ref(".info/connected").on("value", snap => {
      setDbStatus(snap.val() ? "online" : "offline");
    });
    return () => { ref.off(); window.db.ref(".info/connected").off(); };

// ─── STUDENT VIEW ─────────────────────────────────────────────────────────────
function StudentView({ student, attendance, marks, ise2Active, onLogout }) {
  const subj = SUBJECTS.find(s => s.code === student.subjectCode);
  const subjAtt = attendance[student.subjectCode] || {};
  const allDates = Object.keys(subjAtt).sort();
  let present = 0, absent = 0;
  allDates.forEach(d => {
    const rec = subjAtt[d]?.[student.rollNo];
    if (rec === "P") present++;
    else if (rec === "A") absent++;
  });
  const total = present + absent;
  const pct = total ? Math.round((present / total) * 100) : 0;
  const subjMarks = marks[student.subjectCode]?.[student.rollNo] || {};

  return (
    <div style={{ minHeight: "100vh", background: "#0f172a", fontFamily: "'Georgia', serif", color: "#f8fafc" }}>
      {/* Header */}
      <div style={{ background: "linear-gradient(135deg, #1e3a5f, #0f172a)", padding: "20px 24px", display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: "1px solid rgba(255,255,255,0.1)" }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 20 }}>👋 {student.name}</h2>
          <p style={{ margin: 0, color: "#94a3b8", fontSize: 13 }}>Roll No: {student.rollNo} &nbsp;|&nbsp; URN: {student.urn || "–"} &nbsp;|&nbsp; {student.department || ""} · {subj?.name}</p>
        </div>
        <button onClick={onLogout} style={{ background: "#ef4444", border: "none", borderRadius: 8, padding: "8px 16px", color: "#fff", cursor: "pointer", fontFamily: "inherit" }}>Logout</button>
      </div>
      <div style={{ padding: 24, maxWidth: 700, margin: "0 auto" }}>
        {/* Attendance Card */}
        <div style={{ background: "rgba(255,255,255,0.06)", borderRadius: 16, padding: 24, marginBottom: 20, border: "1px solid rgba(255,255,255,0.1)" }}>
          <h3 style={{ margin: "0 0 20px", color: "#f59e0b" }}>📊 Attendance – {subj?.fullName}</h3>
          <div style={{ display: "flex", gap: 16, flexWrap: "wrap", marginBottom: 20 }}>
            {[["Total Classes", total, "#64748b"], ["Present", present, "#22c55e"], ["Absent", absent, "#ef4444"], ["Percentage", pct + "%", pct >= 75 ? "#22c55e" : "#ef4444"]].map(([l, v, c]) => (
              <div key={l} style={{ flex: 1, minWidth: 100, background: "rgba(255,255,255,0.05)", borderRadius: 12, padding: "16px 12px", textAlign: "center", border: `1px solid ${c}40` }}>
                <div style={{ fontSize: 24, fontWeight: 700, color: c }}>{v}</div>
                <div style={{ fontSize: 12, color: "#94a3b8", marginTop: 4 }}>{l}</div>
              </div>
            ))}
          </div>
          {pct < 75 && total > 0 && <div style={{ background: "#7f1d1d", borderRadius: 10, padding: "10px 16px", fontSize: 13, color: "#fca5a5" }}>⚠️ Attendance below 75%. {Math.ceil((0.75 * total - present) / 0.25)} more classes needed to reach 75%.</div>}
          {/* Date-wise */}
          {allDates.length > 0 && (
            <div style={{ marginTop: 16 }}>
              <div style={{ fontSize: 13, color: "#94a3b8", marginBottom: 10 }}>Date-wise Record</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                {allDates.map(d => {
                  const s = subjAtt[d]?.[student.rollNo];
                  return <div key={d} style={{ background: s === "P" ? "#14532d" : "#7f1d1d", borderRadius: 6, padding: "4px 10px", fontSize: 12, color: s === "P" ? "#86efac" : "#fca5a5" }}>{d}<br />{s || "–"}</div>;
                })}
              </div>
            </div>
          )}
        </div>

        {/* Marks Card */}
        <div style={{ background: "rgba(255,255,255,0.06)", borderRadius: 16, padding: 24, border: "1px solid rgba(255,255,255,0.1)" }}>
          <h3 style={{ margin: "0 0 20px", color: "#a78bfa" }}>📝 ISE Marks – {subj?.fullName}</h3>
          <div style={{ display: "flex", gap: 16 }}>
            {["ISE1", "ISE2"].map(ise => {
              const m = subjMarks[ise];
              return (
                <div key={ise} style={{ flex: 1, background: "rgba(167,139,250,0.1)", borderRadius: 12, padding: 20, textAlign: "center", border: "1px solid rgba(167,139,250,0.3)" }}>
                  <div style={{ fontSize: 32, fontWeight: 700, color: "#a78bfa" }}>{m !== undefined ? m : "–"}</div>
                  <div style={{ color: "#94a3b8", fontSize: 13, marginTop: 4 }}>{ise} / 20</div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── DASHBOARD VIEW ───────────────────────────────────────────────────────────
function DashboardView({ students, attendance, marks, activeSubject }) {
  const subj = SUBJECTS.find(s => s.code === activeSubject);
  const studs = students[activeSubject] || [];
  const subjAtt = attendance[activeSubject] || {};
  const allDates = Object.keys(subjAtt);
  const totalClasses = allDates.length;

  let belowThreshold = 0;
  studs.forEach(st => {
    let p = 0;
    allDates.forEach(d => { if (subjAtt[d]?.[st.rollNo] === "P") p++; });
    const pct = totalClasses ? (p / totalClasses) * 100 : 100;
    if (pct < 75 && totalClasses > 0) belowThreshold++;
  });

  const subjMarks = marks[activeSubject] || {};
  let ise1Avg = 0, ise2Avg = 0, ise1Count = 0, ise2Count = 0;
  studs.forEach(st => {
    const m = subjMarks[st.rollNo] || {};
    if (m.ISE1 !== undefined) { ise1Avg += m.ISE1; ise1Count++; }
    if (m.ISE2 !== undefined) { ise2Avg += m.ISE2; ise2Count++; }
  });

  const cards = [
    { label: "Total Students", value: studs.length, icon: "👥", color: "#3b82f6" },
    { label: "Classes Conducted", value: totalClasses, icon: "📅", color: "#f59e0b" },
    { label: "Below 75% Attendance", value: belowThreshold, icon: "⚠️", color: "#ef4444" },
    { label: "ISE 1 Avg", value: ise1Count ? (ise1Avg / ise1Count).toFixed(1) : "–", icon: "📝", color: "#a78bfa" },
    { label: "ISE 2 Avg", value: ise2Count ? (ise2Avg / ise2Count).toFixed(1) : "–", icon: "📝", color: "#22d3ee" },
  ];

  return (
    <div>
      <div style={{ marginBottom: 20 }}>
        <h2 style={{ margin: 0, color: "#f59e0b", fontSize: 22 }}>{subj?.fullName} ({subj?.code})</h2>
        <p style={{ color: "#94a3b8", margin: "4px 0 0", fontSize: 14 }}>Academic Overview</p>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 16, marginBottom: 28 }}>
        {cards.map(c => (
          <div key={c.label} style={{ background: "rgba(255,255,255,0.05)", borderRadius: 16, padding: "20px 16px", border: `1px solid ${c.color}30`, textAlign: "center" }}>
            <div style={{ fontSize: 32 }}>{c.icon}</div>
            <div style={{ fontSize: 28, fontWeight: 700, color: c.color, marginTop: 8 }}>{c.value}</div>
            <div style={{ fontSize: 12, color: "#94a3b8", marginTop: 4 }}>{c.label}</div>
          </div>
        ))}
      </div>

      {/* Recent attendance */}
      {allDates.length > 0 && (
        <div style={{ background: "rgba(255,255,255,0.04)", borderRadius: 16, padding: 20, border: "1px solid rgba(255,255,255,0.08)" }}>
          <h3 style={{ margin: "0 0 16px", fontSize: 16, color: "#f8fafc" }}>Recent Attendance Sessions</h3>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>
            {allDates.slice(-10).reverse().map(d => {
              let p = 0, a = 0;
              studs.forEach(st => { subjAtt[d]?.[st.rollNo] === "P" ? p++ : a++; });
              return (
                <div key={d} style={{ background: "rgba(255,255,255,0.07)", borderRadius: 10, padding: "10px 14px", minWidth: 130 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: "#f8fafc" }}>{d}</div>
                  <div style={{ fontSize: 12, color: "#22c55e", marginTop: 4 }}>✅ {p} Present</div>
                  <div style={{ fontSize: 12, color: "#ef4444" }}>❌ {a} Absent</div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

  const subj = SUBJECTS.find(s => s.code === activeSubject);
  const studs = students[activeSubject] || [];
  const [newRoll, setNewRoll] = useState(""); const [newUrn, setNewUrn] = useState(""); const [newName, setNewName] = useState(""); const [newDept, setNewDept] = useState("");
  const [editIdx, setEditIdx] = useState(null); const [editRoll, setEditRoll] = useState(""); const [editUrn, setEditUrn] = useState(""); const [editName, setEditName] = useState(""); const [editDept, setEditDept] = useState("");
  const fileRef = useRef();

  const addStudent = () => {
    if (!newRoll.trim() || !newName.trim()) return showNotif("Roll No and Name required", "error");
    if (!newUrn.trim()) return showNotif("URN is required", "error");
    if (studs.find(s => s.rollNo === newRoll.trim())) return showNotif("Roll No already exists", "error");
    if (studs.find(s => s.urn === newUrn.trim())) return showNotif("URN already exists", "error");
    setStudents(prev => ({ ...prev, [activeSubject]: [...prev[activeSubject], { rollNo: newRoll.trim(), urn: newUrn.trim(), name: newName.trim(), department: newDept.trim() }] }));
    setNewRoll(""); setNewUrn(""); setNewName(""); setNewDept("");
    showNotif("Student added!");
  };

  const deleteStudent = (roll) => {
    setStudents(prev => ({ ...prev, [activeSubject]: prev[activeSubject].filter(s => s.rollNo !== roll) }));
    showNotif("Student removed");
  };

  const saveEdit = (idx) => {
    const updated = [...studs];
    updated[idx] = { rollNo: editRoll, urn: editUrn, name: editName, department: editDept };
    setStudents(prev => ({ ...prev, [activeSubject]: updated }));
    setEditIdx(null);
    showNotif("Student updated!");
  };

  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const parsed = parseExcelLikeCSV(ev.target.result);
      if (parsed.length === 0) return showNotif("No valid data found. Use RollNo,Name format", "error");
      setStudents(prev => {
        const existing = prev[activeSubject];
        const merged = [...existing];
        parsed.forEach(p => { if (!merged.find(s => s.rollNo === p.rollNo)) merged.push(p); });
        return { ...prev, [activeSubject]: merged };
      });
      showNotif(`${parsed.length} students imported!`);
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20, flexWrap: "wrap", gap: 12 }}>
        <div>
          <h2 style={{ margin: 0, color: "#f59e0b" }}>Students – {subj?.name}</h2>
          <p style={{ margin: "4px 0 0", color: "#94a3b8", fontSize: 13 }}>{studs.length} enrolled</p>
        </div>
        <button onClick={() => fileRef.current.click()} style={{ ...btnStyle("#22c55e", "#15803d"), padding: "10px 18px", fontSize: 14 }}>📤 Import CSV/Excel</button>
        <input ref={fileRef} type="file" accept=".csv,.txt,.xls,.xlsx" onChange={handleFile} style={{ display: "none" }} />
      </div>

      {/* Add row */}
      <div style={{ display: "flex", gap: 10, marginBottom: 20, flexWrap: "wrap" }}>
        <input placeholder="Roll No" value={newRoll} onChange={e => setNewRoll(e.target.value)} style={{ ...inputStyle, width: 90, flex: "0 0 auto" }} />
        <input placeholder="URN" value={newUrn} onChange={e => setNewUrn(e.target.value)} style={{ ...inputStyle, width: 140, flex: "0 0 auto" }} />
        <input placeholder="Student Name" value={newName} onChange={e => setNewName(e.target.value)} style={{ ...inputStyle, flex: 1, minWidth: 150 }} />
        <input placeholder="Department" value={newDept} onChange={e => setNewDept(e.target.value)} style={{ ...inputStyle, width: 130, flex: "0 0 auto" }} onKeyDown={e => e.key === "Enter" && addStudent()} />
        <button onClick={addStudent} style={{ ...btnStyle("#f59e0b", "#b45309"), padding: "10px 20px", fontSize: 14 }}>+ Add</button>
      </div>

      <div style={{ background: "rgba(255,255,255,0.04)", borderRadius: 16, overflow: "hidden", border: "1px solid rgba(255,255,255,0.08)" }}>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead>
            <tr style={{ background: "rgba(255,255,255,0.08)" }}>
              {["#", "Roll No", "URN", "Name", "Department", "Actions"].map(h => <th key={h} style={{ padding: "14px 16px", textAlign: "left", fontSize: 13, color: "#94a3b8", fontWeight: 600 }}>{h}</th>)}
            </tr>
          </thead>
          <tbody>
            {studs.map((s, i) => (
              <tr key={s.rollNo} style={{ borderTop: "1px solid rgba(255,255,255,0.06)" }}>
                <td style={{ padding: "12px 16px", color: "#64748b", fontSize: 13 }}>{i + 1}</td>
                {editIdx === i ? (
                  <>
                    <td style={{ padding: "8px 10px" }}><input value={editRoll} onChange={e => setEditRoll(e.target.value)} style={{ ...inputStyle, padding: "7px 10px", fontSize: 13 }} /></td>
                    <td style={{ padding: "8px 10px" }}><input value={editUrn} onChange={e => setEditUrn(e.target.value)} style={{ ...inputStyle, padding: "7px 10px", fontSize: 13 }} /></td>
                    <td style={{ padding: "8px 10px" }}><input value={editName} onChange={e => setEditName(e.target.value)} style={{ ...inputStyle, padding: "7px 10px", fontSize: 13 }} /></td>
                    <td style={{ padding: "8px 10px" }}><input value={editDept} onChange={e => setEditDept(e.target.value)} style={{ ...inputStyle, padding: "7px 10px", fontSize: 13 }} /></td>
                    <td style={{ padding: "8px 10px" }}>
                      <button onClick={() => saveEdit(i)} style={{ background: "#22c55e", border: "none", borderRadius: 6, padding: "6px 12px", color: "#fff", cursor: "pointer", marginRight: 6, fontFamily: "inherit" }}>Save</button>
                      <button onClick={() => setEditIdx(null)} style={{ background: "#475569", border: "none", borderRadius: 6, padding: "6px 12px", color: "#fff", cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                    </td>
                  </>
                ) : (
                  <>
                    <td style={{ padding: "12px 16px", fontSize: 14, color: "#f59e0b", fontWeight: 600 }}>{s.rollNo}</td>
                    <td style={{ padding: "12px 14px", fontSize: 13, color: "#22d3ee" }}>{s.urn || "–"}</td>
                    <td style={{ padding: "12px 16px", fontSize: 14 }}>{s.name}</td>
                    <td style={{ padding: "12px 14px", fontSize: 13, color: "#94a3b8" }}>{s.department || "–"}</td>
                    <td style={{ padding: "12px 16px" }}>
                      <button onClick={() => { setEditIdx(i); setEditRoll(s.rollNo); setEditUrn(s.urn || ""); setEditName(s.name); setEditDept(s.department || ""); }} style={{ background: "#3b82f6", border: "none", borderRadius: 6, padding: "6px 12px", color: "#fff", cursor: "pointer", marginRight: 6, fontSize: 12, fontFamily: "inherit" }}>✏️ Edit</button>
                      <button onClick={() => deleteStudent(s.rollNo)} style={{ background: "#ef4444", border: "none", borderRadius: 6, padding: "6px 12px", color: "#fff", cursor: "pointer", fontSize: 12, fontFamily: "inherit" }}>🗑️ Delete</button>
                    </td>
                  </>
                )}
              </tr>
            ))}
            {studs.length === 0 && <tr><td colSpan={4} style={{ padding: 32, textAlign: "center", color: "#64748b" }}>No students yet. Add manually or import CSV.</td></tr>}
          </tbody>
        </table>
      </div>
      <p style={{ fontSize: 12, color: "#64748b", marginTop: 12 }}>📌 CSV/Excel format: <strong style={{color:"#94a3b8"}}>RollNo, URN, Name, Department</strong> — header row optional. Auto-detects columns.</p>
    </div>
  );
}

// ─── ATTENDANCE VIEW ──────────────────────────────────────────────────────────
function AttendanceView({ students, attendance, setAttendance, activeSubject, showNotif }) {
  const subj = SUBJECTS.find(s => s.code === activeSubject);
  const studs = students[activeSubject] || [];
  const today = new Date().toISOString().slice(0, 10);
  const [selDate, setSelDate] = useState(today);
  const [session, setSession] = useState("Lecture");
  const subjAtt = attendance[activeSubject] || {};
  const dateKey = `${selDate} (${session})`;
  const existing = subjAtt[dateKey] || {};
  const [localAtt, setLocalAtt] = useState({});
  const [mode, setMode] = useState("full"); // "full" | "quick"
  const [absentInput, setAbsentInput] = useState("");
  const [quickPreview, setQuickPreview] = useState(null); // { valid, invalid, att }

  useEffect(() => {
    const init = {};
    studs.forEach(s => { init[s.rollNo] = existing[s.rollNo] || "P"; });
    setLocalAtt(init);
    setQuickPreview(null);
    setAbsentInput("");
  }, [selDate, session, activeSubject, students]);

  const toggle = (roll) => setLocalAtt(prev => ({ ...prev, [roll]: prev[roll] === "P" ? "A" : "P" }));
  const markAll = (val) => { const o = {}; studs.forEach(s => { o[s.rollNo] = val; }); setLocalAtt(o); };

  // ── Quick Absent Logic ──
  const parseAbsentRolls = (input) => {
    // supports: "1,2,3"  or "1 2 3"  or "1, 2, 3"  or newlines
    return input.split(/[\s,;\n]+/).map(r => r.trim()).filter(Boolean);
  };

  const handleQuickPreview = () => {
    const entered = parseAbsentRolls(absentInput);
    const valid = [], invalid = [];
    entered.forEach(r => {
      if (studs.find(s => s.rollNo === r)) valid.push(r);
      else invalid.push(r);
    });
    // Build attendance: everyone present except entered absent rolls
    const att = {};
    studs.forEach(s => { att[s.rollNo] = valid.includes(s.rollNo) ? "A" : "P"; });
    setQuickPreview({ valid, invalid, att });
  };

  const applyQuickAbsent = () => {
    if (!quickPreview) return;
    setLocalAtt(quickPreview.att);
    setMode("full");
    showNotif(`✅ ${quickPreview.valid.length} absent, ${studs.length - quickPreview.valid.length} present — review & save below`);
  };

  const save = () => {
    setAttendance(prev => ({ ...prev, [activeSubject]: { ...prev[activeSubject], [dateKey]: { ...localAtt } } }));
    showNotif(`Attendance saved for ${dateKey}`);
  };

  const deleteSession = () => {
    setAttendance(prev => {
      const copy = { ...prev[activeSubject] };
      delete copy[dateKey];
      return { ...prev, [activeSubject]: copy };
    });
    showNotif("Session deleted");
  };

  const presentCount = Object.values(localAtt).filter(v => v === "P").length;

  return (
    <div>
      <div style={{ marginBottom: 20 }}>
        <h2 style={{ margin: 0, color: "#f59e0b" }}>Take Attendance – {subj?.name}</h2>
      </div>

      {/* Date + Session */}
      <div style={{ display: "flex", gap: 12, marginBottom: 20, flexWrap: "wrap", alignItems: "flex-end" }}>
        <div>
          <label style={{ fontSize: 12, color: "#94a3b8", display: "block", marginBottom: 4 }}>Date</label>
          <input type="date" value={selDate} onChange={e => setSelDate(e.target.value)} style={{ ...inputStyle, width: 160 }} />
        </div>
        <div>
          <label style={{ fontSize: 12, color: "#94a3b8", display: "block", marginBottom: 4 }}>Session</label>
          <select value={session} onChange={e => setSession(e.target.value)} style={{ ...inputStyle, width: 140 }}>
            {["Lecture", "Tutorial", "Practical", "Extra Class"].map(s => <option key={s} value={s}>{s}</option>)}
          </select>
        </div>
      </div>

      {/* Mode Toggle */}
      <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
        <button onClick={() => { setMode("full"); setQuickPreview(null); }} style={{ padding: "9px 20px", borderRadius: 20, border: "none", cursor: "pointer", fontFamily: "inherit", fontSize: 13, fontWeight: 600, background: mode === "full" ? "linear-gradient(135deg,#f59e0b,#b45309)" : "rgba(255,255,255,0.08)", color: mode === "full" ? "#fff" : "#94a3b8" }}>
          📋 Full Roll Call
        </button>
        <button onClick={() => { setMode("quick"); setQuickPreview(null); }} style={{ padding: "9px 20px", borderRadius: 20, border: "none", cursor: "pointer", fontFamily: "inherit", fontSize: 13, fontWeight: 600, background: mode === "quick" ? "linear-gradient(135deg,#ef4444,#b91c1c)" : "rgba(255,255,255,0.08)", color: mode === "quick" ? "#fff" : "#94a3b8" }}>
          ⚡ Quick Absent Entry
        </button>
      </div>

      {/* ── QUICK ABSENT MODE ── */}
      {mode === "quick" && (
        <div style={{ background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.3)", borderRadius: 16, padding: 24, marginBottom: 20 }}>
          <h3 style={{ margin: "0 0 6px", color: "#f87171", fontSize: 16 }}>⚡ Quick Absent Entry</h3>
          <p style={{ margin: "0 0 16px", color: "#94a3b8", fontSize: 13 }}>
            Enter only the <strong style={{ color: "#fca5a5" }}>absent students' roll numbers</strong>. Everyone else will be marked <strong style={{ color: "#86efac" }}>Present</strong> automatically.
          </p>
          <label style={{ fontSize: 12, color: "#94a3b8", display: "block", marginBottom: 6 }}>
            Absent Roll Numbers <span style={{ color: "#64748b" }}>(separate by comma, space, or new line)</span>
          </label>
          <textarea
            placeholder={"e.g.  3, 7, 12, 15\nor one per line:\n3\n7\n12"}
            value={absentInput}
            onChange={e => { setAbsentInput(e.target.value); setQuickPreview(null); }}
            style={{ ...inputStyle, height: 100, resize: "vertical", fontFamily: "monospace", fontSize: 15, marginBottom: 12 }}
          />

          {/* live chip preview while typing */}
          {absentInput.trim() && !quickPreview && (
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 12 }}>
              {parseAbsentRolls(absentInput).map(r => {
                const exists = studs.find(s => s.rollNo === r);
                return (
                  <span key={r} style={{ padding: "3px 10px", borderRadius: 20, fontSize: 13, background: exists ? "#7f1d1d" : "#1c1917", color: exists ? "#fca5a5" : "#78716c", border: `1px solid ${exists ? "#ef4444" : "#44403c"}` }}>
                    {r}{exists ? "" : " ✗"}
                  </span>
                );
              })}
            </div>
          )}

          <button onClick={handleQuickPreview} style={{ ...btnStyle("#ef4444", "#b91c1c"), padding: "10px 24px", fontSize: 14 }}>
            👁️ Preview Attendance
          </button>

          {/* Preview result */}
          {quickPreview && (
            <div style={{ marginTop: 20 }}>
              {quickPreview.invalid.length > 0 && (
                <div style={{ background: "#7c2d12", borderRadius: 10, padding: "10px 16px", marginBottom: 12, fontSize: 13, color: "#fdba74" }}>
                  ⚠️ Roll numbers not found (ignored): <strong>{quickPreview.invalid.join(", ")}</strong>
                </div>
              )}
              <div style={{ display: "flex", gap: 12, marginBottom: 14, flexWrap: "wrap" }}>
                <div style={{ background: "#14532d", borderRadius: 10, padding: "10px 20px", flex: 1, minWidth: 120, textAlign: "center" }}>
                  <div style={{ fontSize: 26, fontWeight: 700, color: "#86efac" }}>{studs.length - quickPreview.valid.length}</div>
                  <div style={{ fontSize: 12, color: "#86efac", marginTop: 2 }}>✅ Present</div>
                </div>
                <div style={{ background: "#7f1d1d", borderRadius: 10, padding: "10px 20px", flex: 1, minWidth: 120, textAlign: "center" }}>
                  <div style={{ fontSize: 26, fontWeight: 700, color: "#fca5a5" }}>{quickPreview.valid.length}</div>
                  <div style={{ fontSize: 12, color: "#fca5a5", marginTop: 2 }}>❌ Absent</div>
                </div>
              </div>

              {/* Absent names */}
              {quickPreview.valid.length > 0 && (
                <div style={{ marginBottom: 14 }}>
                  <div style={{ fontSize: 13, color: "#94a3b8", marginBottom: 6 }}>Absent Students:</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {quickPreview.valid.map(r => {
                      const s = studs.find(st => st.rollNo === r);
                      return <span key={r} style={{ background: "#7f1d1d", color: "#fca5a5", borderRadius: 20, padding: "4px 12px", fontSize: 13 }}>🔴 {r} – {s?.name}</span>;
                    })}
                  </div>
                </div>
              )}

              <div style={{ display: "flex", gap: 10 }}>
                <button onClick={applyQuickAbsent} style={{ ...btnStyle("#22c55e", "#15803d"), padding: "10px 24px", fontSize: 14 }}>
                  ✅ Apply & Review Full List
                </button>
                <button onClick={() => setQuickPreview(null)} style={{ ...btnStyle("#475569", "#334155"), padding: "10px 18px", fontSize: 14 }}>
                  ✏️ Edit
                </button>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ── FULL ROLL CALL MODE ── */}
      {mode === "full" && (
        <>
          <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
            <button onClick={() => markAll("P")} style={{ ...btnStyle("#22c55e", "#15803d"), padding: "9px 16px", fontSize: 13 }}>✅ All Present</button>
            <button onClick={() => markAll("A")} style={{ ...btnStyle("#ef4444", "#b91c1c"), padding: "9px 16px", fontSize: 13 }}>❌ All Absent</button>
          </div>
          <div style={{ background: "rgba(255,255,255,0.04)", borderRadius: 16, overflow: "hidden", border: "1px solid rgba(255,255,255,0.08)", marginBottom: 16 }}>
            <div style={{ padding: "12px 16px", background: "rgba(255,255,255,0.06)", display: "flex", justifyContent: "space-between", fontSize: 13, color: "#94a3b8" }}>
              <span>{dateKey}</span>
              <span style={{ color: "#22c55e" }}>{presentCount}/{studs.length} Present</span>
            </div>
            <table style={{ width: "100%", borderCollapse: "collapse" }}>
              <thead>
                <tr style={{ background: "rgba(255,255,255,0.04)" }}>
                  {["Roll No", "Name", "Status", "Toggle"].map(h => <th key={h} style={{ padding: "12px 16px", textAlign: "left", fontSize: 13, color: "#94a3b8" }}>{h}</th>)}
                </tr>
              </thead>
              <tbody>
                {studs.map(s => (
                  <tr key={s.rollNo} style={{ borderTop: "1px solid rgba(255,255,255,0.05)", background: localAtt[s.rollNo] === "A" ? "rgba(239,68,68,0.05)" : "transparent" }}>
                    <td style={{ padding: "12px 16px", color: "#f59e0b", fontSize: 14, fontWeight: 600 }}>{s.rollNo}</td>
                    <td style={{ padding: "12px 16px", fontSize: 14 }}>{s.name}</td>
                    <td style={{ padding: "12px 16px" }}>
                      <span style={{ padding: "4px 12px", borderRadius: 20, fontSize: 13, fontWeight: 600, background: localAtt[s.rollNo] === "P" ? "#14532d" : "#7f1d1d", color: localAtt[s.rollNo] === "P" ? "#86efac" : "#fca5a5" }}>
                        {localAtt[s.rollNo] === "P" ? "Present" : "Absent"}
                      </span>
                    </td>
                    <td style={{ padding: "12px 16px" }}>
                      <button onClick={() => toggle(s.rollNo)} style={{ background: localAtt[s.rollNo] === "P" ? "#ef4444" : "#22c55e", border: "none", borderRadius: 8, padding: "6px 14px", color: "#fff", cursor: "pointer", fontSize: 13, fontFamily: "inherit" }}>
                        {localAtt[s.rollNo] === "P" ? "Mark Absent" : "Mark Present"}
                      </button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </>
      )}

      <div style={{ display: "flex", gap: 10 }}>
        <button onClick={save} style={{ ...btnStyle("#f59e0b", "#b45309"), padding: "12px 28px" }}>💾 Save Attendance</button>
        {subjAtt[dateKey] && <button onClick={deleteSession} style={{ ...btnStyle("#ef4444", "#b91c1c"), padding: "12px 20px" }}>🗑️ Delete Session</button>}
      </div>

      {/* Existing sessions */}
      <div style={{ marginTop: 28 }}>
        <h3 style={{ fontSize: 16, color: "#f8fafc", marginBottom: 12 }}>All Sessions ({Object.keys(subjAtt).length})</h3>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>
          {Object.keys(subjAtt).sort().map(dk => {
            let p = 0;
            studs.forEach(s => { if (subjAtt[dk]?.[s.rollNo] === "P") p++; });
            return (
              <div key={dk} onClick={() => { const parts = dk.match(/^(.+) \((.+)\)$/); if (parts) { setSelDate(parts[1]); setSession(parts[2]); setMode("full"); } }} style={{ background: "rgba(255,255,255,0.06)", borderRadius: 10, padding: "10px 14px", cursor: "pointer", border: `1px solid ${dk === dateKey ? "#f59e0b" : "transparent"}`, minWidth: 140 }}>
                <div style={{ fontSize: 13, fontWeight: 600 }}>{dk}</div>
                <div style={{ fontSize: 12, color: "#22c55e", marginTop: 2 }}>{p}/{studs.length} present</div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ─── MARKS VIEW ───────────────────────────────────────────────────────────────
function MarksView({ students, marks, setMarks, activeSubject, showNotif }) {
  const subj = SUBJECTS.find(s => s.code === activeSubject);
  const studs = students[activeSubject] || [];
  const subjMarks = marks[activeSubject] || {};
  const [localMarks, setLocalMarks] = useState({});

  useEffect(() => {
    const init = {};
    studs.forEach(s => {
      init[s.rollNo] = { ISE1: subjMarks[s.rollNo]?.ISE1 ?? "", ISE2: subjMarks[s.rollNo]?.ISE2 ?? "" };
    });
    setLocalMarks(init);
  }, [activeSubject, students]);

  const update = (roll, ise, val) => {
    const num = val === "" ? "" : Math.max(0, Math.min(20, parseInt(val) || 0));
    setLocalMarks(prev => ({ ...prev, [roll]: { ...prev[roll], [ise]: num } }));
  };

  const save = () => {
    const toSave = {};
    studs.forEach(s => {
      toSave[s.rollNo] = { ISE1: localMarks[s.rollNo]?.ISE1, ISE2: localMarks[s.rollNo]?.ISE2 };
    });
    setMarks(prev => ({ ...prev, [activeSubject]: toSave }));
    showNotif("Marks saved!");
  };

  return (
    <div>
      <div style={{ marginBottom: 20 }}>
        <h2 style={{ margin: 0, color: "#a78bfa" }}>ISE Marks – {subj?.name}</h2>
        <p style={{ margin: "4px 0 0", color: "#94a3b8", fontSize: 13 }}>ISE1 and ISE2 — out of 20 each</p>
      </div>
      <div style={{ background: "rgba(255,255,255,0.04)", borderRadius: 16, overflow: "hidden", border: "1px solid rgba(255,255,255,0.08)", marginBottom: 16 }}>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead>
            <tr style={{ background: "rgba(255,255,255,0.08)" }}>
              {["Roll No", "Name", "ISE 1 (/20)", "ISE 2 (/20)", "Total (/40)"].map(h => <th key={h} style={{ padding: "14px 16px", textAlign: "left", fontSize: 13, color: "#94a3b8" }}>{h}</th>)}
            </tr>
          </thead>
          <tbody>
            {studs.map(s => {
              const m = localMarks[s.rollNo] || {};
              const total = (m.ISE1 !== "" && m.ISE1 !== undefined ? parseInt(m.ISE1) : 0) + (m.ISE2 !== "" && m.ISE2 !== undefined ? parseInt(m.ISE2) : 0);
              return (
                <tr key={s.rollNo} style={{ borderTop: "1px solid rgba(255,255,255,0.05)" }}>
                  <td style={{ padding: "10px 16px", color: "#f59e0b", fontWeight: 600, fontSize: 14 }}>{s.rollNo}</td>

                  </td>
                  <td style={{ padding: "10px 12px" }}>
                    <input type="number" min="0" max="20" value={m.ISE2 ?? ""} onChange={e => update(s.rollNo, "ISE2", e.target.value)} style={{ ...inputStyle, width: 80, padding: "8px 12px", textAlign: "center" }} placeholder="–" />
                  </td>

        </table>
      </div>
      <button onClick={save} style={{ ...btnStyle("#a78bfa", "#7c3aed"), padding: "12px 28px" }}>💾 Save Marks</button>
    </div>
  );
}

// ─── ATTENDANCE REPORT ────────────────────────────────────────────────────────
function AttendanceReport({ students, attendance, activeSubject }) {
  const subj = SUBJECTS.find(s => s.code === activeSubject);
  const studs = students[activeSubject] || [];
  const subjAtt = attendance[activeSubject] || {};
  const allDates = Object.keys(subjAtt).sort();

  const rows = studs.map(s => {
    let p = 0;
    allDates.forEach(d => { if (subjAtt[d]?.[s.rollNo] === "P") p++; });
    const total = allDates.length;
    const pct = total ? Math.round((p / total) * 100) : 0;
    return { ...s, present: p, absent: total - p, total, pct };
  });

  const printReport = () => {
    const win = window.open("", "_blank");

        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead>
            <tr style={{ background: "rgba(255,255,255,0.08)" }}>
              {["#", "Roll", "Name", "Present", "Absent", "Total", "%", "Status"].map(h => <th key={h} style={{ padding: "14px 14px", textAlign: "left", fontSize: 13, color: "#94a3b8" }}>{h}</th>)}

          </thead>
          <tbody>
            {rows.map((r, i) => (

                <td style={{ padding: "12px 14px", color: "#64748b", fontSize: 13 }}>{i + 1}</td>

// ─── MARKS REPORT ─────────────────────────────────────────────────────────────
function MarksReport({ students, marks, activeSubject }) {
  const subj = SUBJECTS.find(s => s.code === activeSubject);
  const studs = students[activeSubject] || [];
  const subjMarks = marks[activeSubject] || {};

  const rows = studs.map(s => {
    const m = subjMarks[s.rollNo] || {};
    const ise1 = m.ISE1 !== undefined ? parseInt(m.ISE1) || 0 : null;
    const ise2 = m.ISE2 !== undefined ? parseInt(m.ISE2) || 0 : null;
    const total = (ise1 ?? 0) + (ise2 ?? 0);
    return { ...s, ise1, ise2, total };
  });

  const getGrade = (total) => {
    if (total === null) return "–";
    if (total >= 36) return "O";
    if (total >= 32) return "A+";
    if (total >= 28) return "A";
    if (total >= 24) return "B+";
    if (total >= 20) return "B";
    if (total >= 16) return "C";
    return "F";
  };

  const gradeColor = (g) => {
    if (g === "O" || g === "A+" || g === "A") return "#22c55e";
    if (g === "B+" || g === "B") return "#f59e0b";
    if (g === "C") return "#f97316";
    if (g === "F") return "#ef4444";
    return "#94a3b8";
  };

  const printReport = () => {
    const win = window.open("", "_blank");
    win.document.write(`<html><head><title>Marks Report - ${subj?.name}</title><style>body{font-family:Georgia,serif;padding:20px;color:#111}h1{color:#1e3a5f}table{width:100%;border-collapse:collapse;margin-top:16px}th,td{border:1px solid #ccc;padding:10px 14px;text-align:left}th{background:#1e3a5f;color:#fff}</style></head><body>
      <h1>ADCET – ISE Marks Report</h1>
      <p><strong>Subject:</strong> ${subj?.fullName} (${subj?.code})</p>
      <p><strong>Faculty:</strong> Mr. Santosh T Ghutukade</p>
      <p><strong>Generated:</strong> ${new Date().toLocaleDateString()}</p>
      <table><thead><tr><th>#</th><th>Roll No</th><th>Name</th><th>ISE 1 (/20)</th><th>ISE 2 (/20)</th><th>Total (/40)</th><th>Grade</th></tr></thead>
      <tbody>${rows.map((r, i) => `<tr><td>${i + 1}</td><td>${r.rollNo}</td><td>${r.name}</td><td>${r.ise1 ?? "–"}</td><td>${r.ise2 ?? "–"}</td><td>${r.ise1 !== null || r.ise2 !== null ? r.total : "–"}</td><td>${getGrade(r.ise1 !== null || r.ise2 !== null ? r.total : null)}</td></tr>`).join("")}</tbody></table>
      </body></html>`);
    win.document.close();
    win.print();
  };

  // Stats
  const withMarks = rows.filter(r => r.ise1 !== null || r.ise2 !== null);
  const avg = withMarks.length ? (withMarks.reduce((s, r) => s + r.total, 0) / withMarks.length).toFixed(1) : "–";
  const highest = withMarks.length ? Math.max(...withMarks.map(r => r.total)) : "–";
  const passed = withMarks.filter(r => r.total >= 16).length;

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20, flexWrap: "wrap", gap: 12 }}>
        <div>
          <h2 style={{ margin: 0, color: "#a78bfa" }}>Marks Report – {subj?.name}</h2>
          <p style={{ margin: "4px 0 0", color: "#94a3b8", fontSize: 13 }}>ISE 1 + ISE 2 = Total out of 40</p>
        </div>
        <button onClick={printReport} style={{ ...btnStyle("#3b82f6", "#1d4ed8"), padding: "10px 20px", fontSize: 14 }}>🖨️ Print / PDF</button>
      </div>

      {/* Stats */}
      <div style={{ display: "flex", gap: 14, flexWrap: "wrap", marginBottom: 20 }}>
        {[["Class Avg", avg, "#a78bfa"], ["Highest", highest, "#22c55e"], ["Passed", passed + "/" + withMarks.length, "#f59e0b"]].map(([l, v, c]) => (
          <div key={l} style={{ background: "rgba(255,255,255,0.05)", borderRadius: 12, padding: "16px 20px", border: `1px solid ${c}40`, flex: 1, minWidth: 120 }}>
            <div style={{ fontSize: 22, fontWeight: 700, color: c }}>{v}</div>
            <div style={{ fontSize: 12, color: "#94a3b8", marginTop: 4 }}>{l}</div>
          </div>
        ))}
      </div>

      <div style={{ background: "rgba(255,255,255,0.04)", borderRadius: 16, overflow: "hidden", border: "1px solid rgba(255,255,255,0.08)" }}>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead>
            <tr style={{ background: "rgba(255,255,255,0.08)" }}>
              {["#", "Roll", "Name", "ISE 1 (/20)", "ISE 2 (/20)", "Total (/40)", "Grade"].map(h => <th key={h} style={{ padding: "14px 14px", textAlign: "left", fontSize: 13, color: "#94a3b8" }}>{h}</th>)}
            </tr>
          </thead>
          <tbody>
            {rows.map((r, i) => {
              const hasMarks = r.ise1 !== null || r.ise2 !== null;
              const grade = getGrade(hasMarks ? r.total : null);
              return (
                <tr key={r.rollNo} style={{ borderTop: "1px solid rgba(255,255,255,0.05)" }}>
                  <td style={{ padding: "12px 14px", color: "#64748b", fontSize: 13 }}>{i + 1}</td>
                  <td style={{ padding: "12px 14px", color: "#f59e0b", fontWeight: 600 }}>{r.rollNo}</td>
                  <td style={{ padding: "12px 14px", fontSize: 14 }}>{r.name}</td>
                  <td style={{ padding: "12px 14px", color: "#a78bfa", fontWeight: 600, fontSize: 15 }}>{r.ise1 ?? "–"}</td>
                  <td style={{ padding: "12px 14px", color: "#22d3ee", fontWeight: 600, fontSize: 15 }}>{r.ise2 ?? "–"}</td>
                  <td style={{ padding: "12px 14px", fontWeight: 700, fontSize: 16, color: "#f8fafc" }}>{hasMarks ? r.total : "–"}</td>
                  <td style={{ padding: "12px 14px" }}>
                    <span style={{ padding: "4px 12px", borderRadius: 20, background: `${gradeColor(grade)}22`, color: gradeColor(grade), fontWeight: 700, fontSize: 14 }}>{grade}</span>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <p style={{ fontSize: 12, color: "#64748b", marginTop: 10 }}>Grade: O(≥36) A+(≥32) A(≥28) B+(≥24) B(≥20) C(≥16) F(&lt;16)</p>
    </div>
  );
}

// ─── CUSTOM TABS MANAGER ──────────────────────────────────────────────────────
function CustomTabsManager({ customTabs, setCustomTabs, showNotif }) {
  const [label, setLabel] = useState(""); const [icon, setIcon] = useState("📌"); const [content, setContent] = useState("");
  const [editId, setEditId] = useState(null);

  const ICONS = ["📌", "📊", "📅", "📎", "🗂️", "🔔", "💡", "🎯", "📢", "🗒️"];

  const save = () => {
    if (!label.trim()) return showNotif("Tab name required", "error");
    if (editId) {
      setCustomTabs(prev => prev.map(t => t.id === editId ? { ...t, label, icon, content } : t));
      setEditId(null);
      showNotif("Tab updated!");
    } else {
      const id = Date.now().toString();
      setCustomTabs(prev => [...prev, { id, label, icon, content }]);
      showNotif("New tab added!");
    }
    setLabel(""); setIcon("📌"); setContent("");
  };

  const startEdit = (t) => { setEditId(t.id); setLabel(t.label); setIcon(t.icon); setContent(t.content || ""); };
  const deleteTab = (id) => { setCustomTabs(prev => prev.filter(t => t.id !== id)); showNotif("Tab deleted"); };

  return (
    <div>
      <h2 style={{ margin: "0 0 20px", color: "#f59e0b" }}>{editId ? "✏️ Edit Tab" : "⚙️ Add Custom Tab"}</h2>
      <div style={{ background: "rgba(255,255,255,0.05)", borderRadius: 16, padding: 24, border: "1px solid rgba(255,255,255,0.08)", marginBottom: 28 }}>
        <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 16 }}>
          <div style={{ flex: 1, minWidth: 200 }}>
            <label style={{ fontSize: 12, color: "#94a3b8", display: "block", marginBottom: 6 }}>Tab Name</label>
            <input placeholder="e.g. Lab Attendance" value={label} onChange={e => setLabel(e.target.value)} style={{ ...inputStyle }} />
          </div>
          <div>
            <label style={{ fontSize: 12, color: "#94a3b8", display: "block", marginBottom: 6 }}>Icon</label>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {ICONS.map(ic => (
                <button key={ic} onClick={() => setIcon(ic)} style={{ fontSize: 18, background: icon === ic ? "rgba(245,158,11,0.2)" : "rgba(255,255,255,0.06)", border: icon === ic ? "2px solid #f59e0b" : "2px solid transparent", borderRadius: 8, padding: "4px 8px", cursor: "pointer" }}>{ic}</button>
              ))}
            </div>
          </div>
        </div>
        <div style={{ marginBottom: 16 }}>
          <label style={{ fontSize: 12, color: "#94a3b8", display: "block", marginBottom: 6 }}>Notes / Content (optional)</label>
          <textarea placeholder="Add any notes, reminders, or content for this tab..." value={content} onChange={e => setContent(e.target.value)} style={{ ...inputStyle, height: 100, resize: "vertical" }} />
        </div>
        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={save} style={{ ...btnStyle("#f59e0b", "#b45309"), padding: "10px 24px" }}>{editId ? "💾 Update" : "+ Add Tab"}</button>
          {editId && <button onClick={() => { setEditId(null); setLabel(""); setIcon("📌"); setContent(""); }} style={{ ...btnStyle("#475569", "#334155"), padding: "10px 20px" }}>Cancel</button>}
        </div>
      </div>

      <h3 style={{ fontSize: 16, marginBottom: 12 }}>Your Custom Tabs ({customTabs.length})</h3>
      {customTabs.length === 0 && <p style={{ color: "#64748b" }}>No custom tabs yet. Add one above!</p>}
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {customTabs.map(t => (
          <div key={t.id} style={{ background: "rgba(255,255,255,0.05)", borderRadius: 12, padding: "16px 20px", display: "flex", justifyContent: "space-between", alignItems: "center", border: "1px solid rgba(255,255,255,0.08)" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <span style={{ fontSize: 24 }}>{t.icon}</span>
              <div>
                <div style={{ fontWeight: 600, fontSize: 15 }}>{t.label}</div>
                {t.content && <div style={{ color: "#94a3b8", fontSize: 13, marginTop: 2 }}>{t.content.slice(0, 60)}{t.content.length > 60 ? "..." : ""}</div>}
              </div>
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={() => startEdit(t)} style={{ background: "#3b82f6", border: "none", borderRadius: 8, padding: "6px 14px", color: "#fff", cursor: "pointer", fontSize: 13, fontFamily: "inherit" }}>✏️ Edit</button>
              <button onClick={() => deleteTab(t.id)} style={{ background: "#ef4444", border: "none", borderRadius: 8, padding: "6px 14px", color: "#fff", cursor: "pointer", fontSize: 13, fontFamily: "inherit" }}>🗑️</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── ACTION TAKEN REPORT VIEW ─────────────────────────────────────────────────
function ATRView({ students, attendance, activeSubject }) {
  const subj = SUBJECTS.find(s => s.code === activeSubject);
  const studs = students[activeSubject] || [];
  const subjAtt = attendance[activeSubject] || {};
  const allSessions = Object.keys(subjAtt).sort();

  const today = new Date();
  const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  // Report mode: "monthly" = single month, "upto" = cumulative up to selected month
  const [reportMode, setReportMode] = useState("upto");
  const [selMonth, setSelMonth] = useState(today.getMonth());
  const [selYear, setSelYear] = useState(today.getFullYear());
  const [periodFrom, setPeriodFrom] = useState("01.01.2026");
  const [periodTo, setPeriodTo] = useState("28.02.2026");
  const [reportDate, setReportDate] = useState(today.toLocaleDateString('en-GB').replace(/\//g,'.'));
  const [acYear, setAcYear] = useState("2025-26");

  // Filter sessions based on mode
  const monthStr = `${selYear}-${String(selMonth+1).padStart(2,'0')}`;
  const filteredSessions = reportMode === "monthly"
    ? allSessions.filter(s => s.startsWith(monthStr))
    : allSessions.filter(s => {
        const sessionMonth = s.slice(0,7); // "YYYY-MM"
        return sessionMonth <= monthStr;
      });

  // Compute per-student attendance for filtered sessions
  const computed = studs.map(s => {
    let present = 0;
    filteredSessions.forEach(sess => { if (subjAtt[sess]?.[s.rollNo] === 'P') present++; });
    const total = filteredSessions.length;
    const pct = total > 0 ? Math.round((present / total) * 100) : null;
    return { ...s, present, total, pct };
  });
  const defaulters = computed.filter(s => s.pct !== null && s.pct < 75);

  // Dept summary
  const deptMap = {};
  studs.forEach(s => {
    if (!deptMap[s.department]) deptMap[s.department] = { total: 0, def: 0 };
    deptMap[s.department].total++;
  });
  defaulters.forEach(s => { if (deptMap[s.department]) deptMap[s.department].def++; });

  const modeLabel = reportMode === "monthly"
    ? `${months[selMonth]} ${selYear}`
    : `Upto ${months[selMonth]} ${selYear}`;

  const generateReport = () => {
    const subjectLabel = activeSubject === "2MEIE201"
      ? "Minor Industrial Engineering (2MEIE201)"
      : "Minor Supply Chain Management (2MEIE302)";

    const rows = defaulters.map((s, i) =>
      `<tr><td>${i+1}</td><td>${s.urn||'–'}</td><td>${s.name}</td><td>${s.department||'–'}</td><td>${s.present}/${s.total} (${s.pct}%)</td><td></td></tr>`
    ).join('');

    const deptRows = Object.entries(deptMap).map(([d, v]) =>
      `<tr><td>${d}</td><td>${v.total}</td><td>${v.def}</td></tr>`
    ).join('');

    const html = `<!DOCTYPE html><html><head><title>ATR - ${subj?.name} - ${modeLabel}</title>
    <style>
      body { font-family: 'Times New Roman', serif; padding: 40px; max-width: 900px; margin: auto; font-size: 13pt; }
      h2 { text-align: center; font-size: 14pt; margin: 4px 0; }
      .date-right { text-align: right; font-weight: bold; }
      table { border-collapse: collapse; width: 100%; margin: 10px 0; }
      th, td { border: 1px solid #000; padding: 6px 10px; }
      th { background: #e0e0e0; font-weight: bold; text-align: center; }
      td { text-align: center; }
      td:nth-child(3) { text-align: left; }
      .sig { display: flex; justify-content: space-between; margin-top: 60px; font-size: 12pt; }
      .info { margin: 4px 0; line-height: 2; }
      @media print { body { padding: 20px; } }
    </style></head><body>
    <h2>Annasaheb Dange College of Engineering and Technology, Ashta</h2>
    <h2>Academic Year: ${acYear} (Term I)</h2>
    <h2>Action Taken Report on Monthly Attendance for Minor Course</h2>
    <div class="date-right">Date: ${reportDate}</div>
    <br/>
    <div class="info">Course Code and Name : ${subjectLabel}</div>
    <div class="info">Month &amp; Year &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;: ${modeLabel}</div>
    <div class="info"><b>Period &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;: ${periodFrom} to ${periodTo}</b></div>
    <div class="info">Total No of Students : ${studs.length} &nbsp;&nbsp; Total Sessions : ${filteredSessions.length}</div>
    <br/>
    <table>
      <thead><tr><th>Dept</th><th>No of Students</th><th>No of Defaulters</th></tr></thead>
      <tbody>${deptRows}</tbody>
    </table>
    <br/>
    <div><u><b>Read and Understood:</b></u></div>
    <div style="font-size:11pt; margin: 6px 0 10px;">I have to maintain a minimum of 75% attendance in each course. If I fail to maintain it, I will be detained. I am aware about the detention policy.</div>
    <div><b>No of Defaulters (Less than 75%) : ${defaulters.length}</b></div>
    <br/>
    <table>
      <thead><tr><th>Sr. No</th><th>URN</th><th>Student Name</th><th>Department</th><th>Attendance %</th><th>Student Signature</th></tr></thead>
      <tbody>${rows || '<tr><td colspan="6">No defaulters for this period</td></tr>'}</tbody>
    </table>
    <div class="sig">
      <span>Course Coordinator</span>
      <span>Head of the Department</span>
      <span>Dean Academics</span>
    </div>
    </body></html>`;

    const win = window.open('', '_blank');
    win.document.write(html);
    win.document.close();
    setTimeout(() => win.print(), 600);
  };

  return (
    <div>
      <div style={{ marginBottom: 20 }}>
        <h2 style={{ margin: 0, color: "#f59e0b" }}>📄 Action Taken Report – {subj?.name}</h2>
        <p style={{ margin: "4px 0 0", color: "#94a3b8", fontSize: 13 }}>Auto-filled from attendance data · Print or save as PDF</p>
      </div>

      {/* Mode Toggle */}
      <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
        <button onClick={() => setReportMode("upto")} style={{ padding: "9px 20px", borderRadius: 20, border: "none", cursor: "pointer", fontFamily: "inherit", fontSize: 13, fontWeight: 600, background: reportMode === "upto" ? "linear-gradient(135deg,#f59e0b,#b45309)" : "rgba(255,255,255,0.08)", color: reportMode === "upto" ? "#fff" : "#94a3b8" }}>
          📊 Cumulative (Upto Month)
        </button>
        <button onClick={() => setReportMode("monthly")} style={{ padding: "9px 20px", borderRadius: 20, border: "none", cursor: "pointer", fontFamily: "inherit", fontSize: 13, fontWeight: 600, background: reportMode === "monthly" ? "linear-gradient(135deg,#3b82f6,#1d4ed8)" : "rgba(255,255,255,0.08)", color: reportMode === "monthly" ? "#fff" : "#94a3b8" }}>
          📅 Single Month Only
        </button>
      </div>

      {/* Info banner */}
      <div style={{ background: reportMode === "upto" ? "rgba(245,158,11,0.08)" : "rgba(59,130,246,0.08)", border: `1px solid ${reportMode === "upto" ? "rgba(245,158,11,0.25)" : "rgba(59,130,246,0.25)"}`, borderRadius: 10, padding: "10px 16px", fontSize: 13, color: "#94a3b8", marginBottom: 20 }}>
        {reportMode === "upto"
          ? `📊 Cumulative mode: counts ALL sessions from the beginning up to end of ${months[selMonth]} ${selYear}. This matches "upto Feb total" style reports.`
          : `📅 Monthly mode: counts only sessions within ${months[selMonth]} ${selYear}.`}
      </div>

      {/* Settings */}
      <div style={{ background: "rgba(255,255,255,0.05)", borderRadius: 16, padding: 24, border: "1px solid rgba(255,255,255,0.08)", marginBottom: 24 }}>
        <h3 style={{ margin: "0 0 16px", fontSize: 15, color: "#f8fafc" }}>⚙️ Report Settings</h3>
        <div style={{ display: "flex", gap: 14, flexWrap: "wrap" }}>
          <div>
            <label style={{ fontSize: 12, color: "#94a3b8", display: "block", marginBottom: 5 }}>{reportMode === "upto" ? "Upto Month" : "Month"}</label>
            <select value={selMonth} onChange={e => setSelMonth(parseInt(e.target.value))} style={{ ...inputStyle, width: 150 }}>
              {months.map((m, i) => <option key={m} value={i}>{m}</option>)}
            </select>
          </div>
          <div>
            <label style={{ fontSize: 12, color: "#94a3b8", display: "block", marginBottom: 5 }}>Year</label>
            <input type="number" value={selYear} onChange={e => setSelYear(parseInt(e.target.value))} style={{ ...inputStyle, width: 100 }} />
          </div>
          <div>
            <label style={{ fontSize: 12, color: "#94a3b8", display: "block", marginBottom: 5 }}>Academic Year</label>
            <input value={acYear} onChange={e => setAcYear(e.target.value)} style={{ ...inputStyle, width: 120 }} placeholder="2025-26" />
          </div>
          <div>
            <label style={{ fontSize: 12, color: "#94a3b8", display: "block", marginBottom: 5 }}>Period From</label>
            <input value={periodFrom} onChange={e => setPeriodFrom(e.target.value)} style={{ ...inputStyle, width: 130 }} placeholder="01.01.2026" />
          </div>
          <div>
            <label style={{ fontSize: 12, color: "#94a3b8", display: "block", marginBottom: 5 }}>Period To</label>
            <input value={periodTo} onChange={e => setPeriodTo(e.target.value)} style={{ ...inputStyle, width: 130 }} placeholder="28.02.2026" />
          </div>
          <div>
            <label style={{ fontSize: 12, color: "#94a3b8", display: "block", marginBottom: 5 }}>Report Date</label>
            <input value={reportDate} onChange={e => setReportDate(e.target.value)} style={{ ...inputStyle, width: 130 }} placeholder="28.02.2026" />
          </div>
        </div>
      </div>

      {/* Preview Summary */}
      <div style={{ display: "flex", gap: 14, flexWrap: "wrap", marginBottom: 20 }}>
        {[
          ["Sessions Counted", filteredSessions.length, "#f59e0b"],
          ["Total Students", studs.length, "#3b82f6"],
          ["Defaulters (<75%)", defaulters.length, "#ef4444"],
        ].map(([l, v, c]) => (
          <div key={l} style={{ flex: 1, minWidth: 140, background: "rgba(255,255,255,0.05)", borderRadius: 12, padding: "16px 20px", border: `1px solid ${c}40`, textAlign: "center" }}>
            <div style={{ fontSize: 28, fontWeight: 700, color: c }}>{v}</div>
            <div style={{ fontSize: 12, color: "#94a3b8", marginTop: 4 }}>{l}</div>
          </div>
        ))}
      </div>

      {filteredSessions.length === 0 && (
        <div style={{ background: "rgba(245,158,11,0.1)", border: "1px solid rgba(245,158,11,0.3)", borderRadius: 12, padding: "14px 20px", color: "#fcd34d", fontSize: 14, marginBottom: 20 }}>
          ⚠️ No attendance sessions found for this period. Take attendance first.
        </div>
      )}

      {/* Sessions used */}
      {filteredSessions.length > 0 && (
        <div style={{ background: "rgba(255,255,255,0.03)", borderRadius: 10, padding: "10px 16px", marginBottom: 16, fontSize: 12, color: "#64748b" }}>
          Sessions included: {filteredSessions.join(" · ")}
        </div>
      )}

      {/* Dept Preview Table */}
      {filteredSessions.length > 0 && (
        <div style={{ background: "rgba(255,255,255,0.04)", borderRadius: 14, overflow: "hidden", border: "1px solid rgba(255,255,255,0.08)", marginBottom: 20 }}>
          <div style={{ padding: "12px 16px", background: "rgba(255,255,255,0.06)", fontSize: 13, color: "#94a3b8" }}>Department Summary</div>
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead>
              <tr style={{ background: "rgba(255,255,255,0.06)" }}>
                {["Department", "Students", "Defaulters"].map(h => <th key={h} style={{ padding: "10px 16px", textAlign: "left", fontSize: 13, color: "#94a3b8" }}>{h}</th>)}
              </tr>
            </thead>
            <tbody>
              {Object.entries(deptMap).map(([d, v]) => (
                <tr key={d} style={{ borderTop: "1px solid rgba(255,255,255,0.05)" }}>
                  <td style={{ padding: "10px 16px", fontSize: 13 }}>{d}</td>
                  <td style={{ padding: "10px 16px", fontSize: 13, color: "#3b82f6" }}>{v.total}</td>
                  <td style={{ padding: "10px 16px", fontSize: 13, color: v.def > 0 ? "#ef4444" : "#22c55e", fontWeight: 600 }}>{v.def}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {/* Defaulters Preview */}
      {defaulters.length > 0 && (
        <div style={{ background: "rgba(255,255,255,0.04)", borderRadius: 14, overflow: "hidden", border: "1px solid rgba(239,68,68,0.2)", marginBottom: 20 }}>
          <div style={{ padding: "12px 16px", background: "rgba(239,68,68,0.1)", fontSize: 13, color: "#fca5a5" }}>Defaulters List — {defaulters.length} students below 75% ({modeLabel})</div>
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead>
              <tr style={{ background: "rgba(255,255,255,0.04)" }}>
                {["#","Roll","URN","Name","Dept","Present","Total","%"].map(h => <th key={h} style={{ padding: "10px 14px", textAlign: "left", fontSize: 12, color: "#94a3b8" }}>{h}</th>)}
              </tr>
            </thead>
            <tbody>
              {defaulters.map((s, i) => (
                <tr key={s.rollNo} style={{ borderTop: "1px solid rgba(255,255,255,0.05)" }}>
                  <td style={{ padding: "9px 14px", fontSize: 13, color: "#64748b" }}>{i+1}</td>
                  <td style={{ padding: "9px 14px", fontSize: 13, color: "#f59e0b", fontWeight: 600 }}>{s.rollNo}</td>
                  <td style={{ padding: "9px 14px", fontSize: 13, color: "#22d3ee" }}>{s.urn||'–'}</td>
                  <td style={{ padding: "9px 14px", fontSize: 13 }}>{s.name}</td>
                  <td style={{ padding: "9px 14px", fontSize: 12, color: "#94a3b8" }}>{s.department}</td>
                  <td style={{ padding: "9px 14px", fontSize: 13, color: "#22c55e", fontWeight: 600 }}>{s.present}</td>
                  <td style={{ padding: "9px 14px", fontSize: 13, color: "#94a3b8" }}>{s.total}</td>
                  <td style={{ padding: "9px 14px" }}>
                    <span style={{ background: "#7f1d1d", color: "#fca5a5", borderRadius: 20, padding: "3px 12px", fontSize: 13, fontWeight: 700 }}>{s.pct}%</span>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      <button onClick={generateReport} style={{ ...btnStyle("#f59e0b", "#b45309"), padding: "13px 32px", fontSize: 15 }}>
        🖨️ Generate & Print Report (Word-ready)
      </button>
      <p style={{ color: "#64748b", fontSize: 12, marginTop: 10 }}>Opens print dialog → Save as PDF or print directly. Layout matches the original ATR format.</p>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
