          <div style={{ textAlign:"right" }}>
            <div style={{ fontSize:26, fontWeight:700, fontVariantNumeric:"tabular-nums", color: timeLeft<120?"#ef4444":timeLeft<300?"#f59e0b":"#22c55e" }}>{fmtTime(timeLeft)}</div>
            <div style={{ fontSize:11, color:"#64748b" }}>remaining</div>
          </div>
        </div>
        {/* Timer bar */}
        <div style={{ height:5, background:"rgba(255,255,255,0.08)", borderRadius:4, marginBottom:16, overflow:"hidden" }}>
          <div style={{ height:"100%", width:`${timePct}%`, background:timePct>50?"#22c55e":timePct>20?"#f59e0b":"#ef4444", transition:"width 1s linear" }} />
        </div>
        {/* Question */}
        <div style={{ background:"rgba(255,255,255,0.05)", borderRadius:16, padding:"22px 24px", marginBottom:16, border:"1px solid rgba(255,255,255,0.1)" }}>
          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:10 }}>
            <span style={{ background:"rgba(245,158,11,0.18)", color:"#f59e0b", borderRadius:6, padding:"3px 12px", fontSize:12, fontWeight:700 }}>Unit {q.unit}</span>
            <span style={{ fontSize:12, color:"#64748b" }}>Q {currentQ+1} / {questions.length}</span>
          </div>
          <div style={{ fontSize:15.5, fontWeight:600, lineHeight:1.65, marginBottom:20, color:"#f8fafc" }}>{q.q}</div>
          <div style={{ display:"flex", flexDirection:"column", gap:9 }}>
            {q.shuffledOpts.map((opt,i) => {
              const sel = answers[currentQ]===i;
              return (
                <div key={i} onClick={() => setAnswers(a => ({...a,[currentQ]:i}))}
                  style={{ display:"flex", alignItems:"center", gap:14, padding:"12px 16px", borderRadius:10, cursor:"pointer", border:`2px solid ${sel?"#f59e0b":"rgba(255,255,255,0.09)"}`, background:sel?"rgba(245,158,11,0.1)":"rgba(255,255,255,0.03)", color:sel?"#fcd34d":"#cbd5e1", fontSize:14, transition:"all 0.15s" }}>
                  <span style={{ width:26,height:26,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:12,fontWeight:700,background:sel?"#f59e0b":"rgba(255,255,255,0.1)",color:sel?"#000":"#94a3b8" }}>{String.fromCharCode(65+i)}</span>
                  {opt.text}
                </div>
              );
            })}
          </div>
        </div>
        {/* Navigation */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
          <button onClick={() => setCurrentQ(q => Math.max(0,q-1))} disabled={currentQ===0} style={{ ...btnStyle("#475569","#334155"), padding:"9px 20px", opacity:currentQ===0?0.4:1 }}>◀ Prev</button>

            {questions.map((_,i) => (
              <div key={i} onClick={() => setCurrentQ(i)} style={{ width:28,height:28,borderRadius:6,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,background:i===currentQ?"#f59e0b":answers[i]!==undefined?"#22c55e":"rgba(255,255,255,0.1)",color:(i===currentQ||answers[i]!==undefined)?"#000":"#64748b" }}>{i+1}</div>

          {currentQ<questions.length-1
            ? <button onClick={() => setCurrentQ(q => q+1)} style={{ ...btnStyle("#3b82f6","#1d4ed8"), padding:"9px 20px" }}>Next ▶</button>

              </div>

        </div>

        <div style={{ background:"rgba(255,255,255,0.04)", borderRadius:14, overflow:"auto", border:"1px solid rgba(255,255,255,0.08)" }}>
          <table style={{ width:"100%", borderCollapse:"collapse", minWidth:780 }}>
            <thead>
              <tr style={{ background:"rgba(255,255,255,0.07)" }}>
                {["#","Roll","URN","Name","Dept","MCQ /20","MCQ /5","Presentation /15","Total ISE I /20"].map(h => (
                  <th key={h} style={{ padding:"11px 12px", textAlign:"left", fontSize:12, color:"#94a3b8", whiteSpace:"nowrap" }}>{h}</th>

              </tr>
            </thead>
            <tbody>
              {allStudents.map((s, i) => {
                const r = testResults[s.rollNo] || {};
                const m = marks[activeSubject]?.[s.rollNo] || {};
                const mcq20 = r.mcq20 ?? m.ISE1_MCQ20 ?? "–";
                const mcq5  = r.mcq5  ?? m.ISE1_MCQ5  ?? "–";
                const pres  = r.presentation15 ?? m.Presentation ?? "";
                const total = (mcq5 !== "–" && pres !== "") ? parseFloat((parseFloat(mcq5) + parseFloat(pres)).toFixed(2)) : "–";
                return (
                  <tr key={s.rollNo} style={{ borderTop:"1px solid rgba(255,255,255,0.05)" }}>
                    <td style={{ padding:"9px 12px", color:"#64748b", fontSize:12 }}>{i+1}</td>
                    <td style={{ padding:"9px 12px", color:"#f59e0b", fontWeight:700, fontSize:13 }}>{s.rollNo}</td>
                    <td style={{ padding:"9px 12px", color:"#22d3ee", fontSize:12 }}>{s.urn||"–"}</td>
                    <td style={{ padding:"9px 12px", fontSize:13 }}>{s.name}</td>
                    <td style={{ padding:"9px 12px", fontSize:12, color:"#94a3b8" }}>{s.department||"–"}</td>
                    <td style={{ padding:"9px 12px", fontSize:14, fontWeight:600, color: mcq20!=="–"?"#f59e0b":"#475569" }}>{mcq20}</td>
                    <td style={{ padding:"9px 12px", fontSize:14, fontWeight:600, color: mcq5!=="–"?"#22d3ee":"#475569" }}>{mcq5}</td>
                    <td style={{ padding:"9px 12px" }}>
                      <input
                        type="number" min="0" max="15" step="0.5"
                        value={pres}
                        onChange={e => updatePresentation(s.rollNo, e.target.value)}
                        placeholder="0–15"
                        style={{ ...inputStyle, width:80, padding:"6px 10px", fontSize:13, textAlign:"center" }}
                      />
                    </td>
                    <td style={{ padding:"9px 12px", fontSize:15, fontWeight:700, color: total!=="–"?(total>=10?"#22c55e":"#ef4444"):"#475569" }}>{total}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <p style={{ fontSize:12, color:"#475569", marginTop:10 }}>💡 Tip: Enter Presentation marks (out of 15) directly in the table. Total ISE I = MCQ /5 + Presentation /15 (max 20).</p>
      </div>
    );
  }

  return null;
}
